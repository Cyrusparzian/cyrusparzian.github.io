
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IP Threat Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 20px;
      background: #ecf0f1;
    }
    h1 {
      color: #2c3e50;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
      border: 1px solid #bdc3c7;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }
    .card-header {
      background: #34495e;
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header .ip {
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }
    .card-header .country {
      background: #2c3e50;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .card-body {
      padding: 16px;
    }
    .score {
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-weight: 600;
      text-align: center;
      font-size: 1rem;
    }
    .card-body p {
      margin: 6px 0;
      font-size: 0.9rem;
      color: #2c3e50;
    }
    details {
      margin-top: 12px;
    }
    summary {
      cursor: pointer;
      color: #2980b9;
      font-weight: 600;
      font-size: 0.9rem;
    }
    ul {
      margin: 6px 0 0 18px;
      padding: 0;
      font-size: 0.8rem;
      color: #2c3e50;
    }
    li {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>🔍 IP Threat Intelligence Dashboard</h1>
  <div class="grid">
    
    <div class="card">
      <div class="card-header">
        <span class="ip">119.235.221.127</span>
        <span class="country">Indonesia</span>
      </div>
      <div class="card-body">
        <div class="score" style="background-color: #c0392b;">
          Abuse Score: 100
        </div>
        <p><strong>Reports:</strong> 83</p>
        <p><strong>Last Reported:</strong> 3/13/2026, 12:20:13 AM</p>
        <p><strong>ISP:</strong> PT. Mora Telematika Indonesia</p>
        <p><strong>Domain:</strong> moratelindo.co.id</p>
        <details>
          <summary>URIs (50)</summary>
          <ul><li>/.git/HEAD</li><li>/.git/HEAD</li><li>/</li><li>/.env.bak</li><li>/.env.bak</li><li>… and 45 more</li></ul>
        </details>
      </div>
    </div>
  
  </div>
</body>
</html>
